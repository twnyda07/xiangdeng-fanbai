<style>
:root{--ink:#241a10;--ink2:#5b4a36;--paper:#f7f2e8;--card:#fffefa;--gold:#8a5a06;--gold2:#7a4f05;--line:#ddcfb4;--accent:#7a1f1f;--chip:#efe6d2;--shadow:0 2px 6px rgba(80,60,20,.14);}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--paper);color:var(--ink);font-family:"PingFang TC","Heiti TC","Microsoft JhengHei","Noto Sans TC",sans-serif;font-size:19px;line-height:1.65;-webkit-font-smoothing:antialiased}
.wrap{max-width:680px;margin:0 auto;padding:0 14px 48px}
header{text-align:center;padding:20px 14px 14px;border-bottom:3px solid var(--gold)}
h1{margin:0;font-size:30px;letter-spacing:2px}
.tag-sub{margin:6px 0 0;font-size:16px;color:var(--ink2)}
.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:14px;margin:16px 0}
.searchrow{display:flex;gap:8px}
#q{flex:1;min-width:0;padding:14px;font-size:19px;border:2px solid var(--line);border-radius:12px;background:#fff;font-family:inherit}
.hint{font-size:14px;color:var(--ink2);margin:8px 2px 0}
#cats{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.seg-b{min-height:50px;padding:8px 14px;font-size:18px;font-weight:700;border:2px solid var(--gold);background:#fff;color:var(--gold);border-radius:12px;cursor:pointer;font-family:inherit}
.seg-b i{font-style:normal;font-size:14px;opacity:.75}
.seg-b.on{background:var(--gold);color:#fff}
.seg-b.c1.on{background:#33521f;border-color:#33521f}.seg-b.c2.on{background:#22405e;border-color:#22405e}.seg-b.c3.on{background:#7a1f1f;border-color:#7a1f1f}.seg-b.c4.on{background:#6b4a12;border-color:#6b4a12}.seg-b.c5.on{background:#4a2d5e;border-color:#4a2d5e}
.togglebtn{display:block;width:100%;margin-top:4px;min-height:50px;font-size:17px;background:#fbf4e2;border:2px solid var(--line);border-radius:12px;color:var(--gold2);cursor:pointer;font-family:inherit;font-weight:700}
.mapgrp{margin-top:14px}
.mapgrp-t{font-size:16px;font-weight:700;color:var(--accent);border-left:5px solid var(--accent);padding-left:9px;margin-bottom:9px}
.mapgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.lcard{min-height:74px;padding:9px 8px;border:2px solid var(--line);border-radius:12px;background:#fff;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;gap:2px;text-align:center;justify-content:center}
.lcard .lno{font-size:13px;color:var(--gold2);font-weight:700}
.lcard .lnm{font-size:18px;font-weight:700;color:var(--ink)}
.lcard .lct{font-size:13px;color:var(--ink2)}
.lcard.on{background:var(--gold);border-color:var(--gold)}
.lcard.on .lno,.lcard.on .lnm,.lcard.on .lct{color:#fff}
.lcard.dim{opacity:.55}
#media,#events{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-top:12px}
#pieces{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px;max-height:42vh;overflow:auto}
.flbl{font-size:15px;color:var(--ink2);font-weight:700;margin-right:2px}

.mchip.on,.echip.on,.pchip.on{background:var(--gold);color:#fff;border-color:var(--gold)}
.pchip.on i{opacity:.85}
#pills{display:flex;flex-wrap:wrap;gap:7px;margin:16px 2px 0}
.pill{background:var(--gold);color:#fff;border:none;border-radius:20px;padding:7px 14px;font-size:15px;cursor:pointer;font-family:inherit}
.pill.clr{background:#fff;color:var(--accent);border:2px solid var(--accent)}
.status{font-size:16px;color:var(--ink2);margin:16px 2px 12px;font-weight:700}
.card{background:var(--card);border:1px solid var(--line);border-left:6px solid var(--gold);border-radius:14px;padding:15px;margin-bottom:13px;box-shadow:var(--shadow)}
.card .ct{font-size:20px;font-weight:700;line-height:1.45;margin-bottom:9px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:9px}
.tag{font-size:13px;padding:3px 10px;border-radius:13px;background:var(--chip);color:var(--ink2);white-space:nowrap}
.tag.c1{background:#e2efd9;color:#33521f}.tag.c2{background:#dde7f2;color:#22405e}.tag.c3{background:#f3e0e0;color:#7a1f1f}.tag.c4{background:#f1e6c9;color:#6b4a12}.tag.c5{background:#e7ddf0;color:#4a2d5e}.tag.c6{background:#dcecec;color:#1f5151}
.tag.les{background:var(--gold);color:#fff}.tag.pc{background:#efe0c4;color:#6b4a12}.tag.ev{background:#f6ede0;color:#8a5a06;border:1px solid #e5d3b0}
.tag.mv{background:#f5dede;color:#8a2020}.tag.au{background:#dcecdc;color:#2e5a2e}.tag.pd{background:#dde7f2;color:#22405e}.tag.dc{background:#eae0d2;color:#6b4a2a}.tag.xl{background:#dfeede;color:#2e6a2e}.tag.lk{background:#e6e6ef;color:#43436b}.tag.im{background:#f0e6d0;color:#7a5a1a}
.tag.sz{background:#f2ece0;color:#8a7a56}.tag.rst{background:#7a1f1f;color:#fff}
.src{font-size:14px;color:var(--ink2);margin-bottom:11px;word-break:break-all}
.open{display:block;text-align:center;text-decoration:none;background:var(--accent);color:#fff;font-size:19px;font-weight:700;padding:13px;border-radius:12px}
.open:active{opacity:.85}
.empty{text-align:center;color:var(--ink2);padding:34px 12px;font-size:18px}
#more{display:none;width:100%;min-height:56px;font-size:19px;font-weight:700;background:#fff;border:2px solid var(--gold);color:var(--gold);border-radius:12px;cursor:pointer;font-family:inherit;margin-top:4px}
.foot{font-size:13px;color:var(--ink2);border-top:1px dashed var(--line);margin-top:26px;padding-top:14px;text-align:center;line-height:1.8}
@media(min-width:820px){
 body{font-size:20px}.wrap{max-width:1040px;padding:0 22px 56px}h1{font-size:36px}
 .mapgrid{grid-template-columns:1fr 1fr 1fr 1fr}
 #results{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
 #results .card{margin-bottom:0}
}
</style>

sub":null,"mediaType":"影片","event":null,"lesson":null,"piece":"唱誦梵唄的功德","restricted":false},{"id":"1uIvhDf3I8QOE_qJFH85oRhft_Xr6tsMA","title":"【雲端華嚴】卷02 世主妙嚴品卷2大意、梵唄唱誦的意義與功德 見輝法師開示-字幕版.mp4","path":"補充影片（資料夾外） / 雲端華嚴","root":"補充影片（資料夾外）","url":"https://drive.google.com/file/d/1uIvhDf3I8QOE_qJFH85oRhft_Xr6tsMA/view?usp=drivesdk","mime":"video/mp4","ext":"mp4","size":23364559,"modified":"2020-08-04T01:47:26Z","created":"2022-07-05T08:45:24.271Z","extra":true,"category":"梵唄開示","sub":"華嚴法會","mediaType":"影片","event":"華嚴法會","lesson":null,"piece":"梵唄的意義與功德","restricted":false},{"id":"1B6CxKDxtZEo0RAvs8QmbfOtUKg8KT6R_","title":"叢林五堂功課、早晚課誦及梵唄的意義(星璨法師錄製不完全).mp4","path":"補充影片（資料夾外） / 叢林五堂功課","root":"補充影片（資料夾外）","url":"https://drive.google.com/file/d/1B6CxKDxtZEo0RAvs8QmbfOtUKg8KT6R_/view?usp=drivesdk","mime":"video/mp4","ext":"mp4","size":141931002,"modified":"2023-03-02T05:40:45.129Z","created":"2023-03-02T05:33:31.871Z","extra":true,"category":"梵唄開示","sub":null,"mediaType":"影片","event":null,"lesson":null,"piece":"五堂功課與梵唄意義","restricted":false}];
const LESSONMAP=[{"group":"早課","lessons":[{"n":1,"no":"第一堂","name":"法器認識"},{"n":2,"no":"第二堂","name":"禮佛三拜"},{"n":7,"no":"第七、八堂","name":"爐香讚"},{"n":9,"no":"第九堂","name":"普賢十大願"},{"n":10,"no":"第十堂","name":"懺悔偈"},{"n":11,"no":"第十一堂","name":"讚佛偈、佛號"},{"n":12,"no":"第十二堂","name":"四生九有"},{"n":13,"no":"第十三堂","name":"三皈依"},{"n":14,"no":"第十四堂","name":"韋馱讚"},{"n":16,"no":"第十六堂","name":"善女天咒"}]},{"group":"晚課","lessons":[{"n":15,"no":"第十五堂","name":"簡易施食"},{"n":17,"no":"第十七、十八堂","name":"小蒙山施食"},{"n":19,"no":"第十九堂","name":"伽藍讚"}]},{"group":"法器","lessons":[{"n":3,"no":"第三堂","name":"早鐘、晚鐘"},{"n":4,"no":"第四堂","name":"早鼓、晚鼓"},{"n":5,"no":"第五堂","name":"起板"},{"n":6,"no":"第六堂","name":"午板、安板"}]}];
const CATS=["梵唄唱誦","法器","香燈實務","法會教材","梵唄開示","發聲教學"];
const MEDIA=["影片","音檔","講義PDF","文件","表單"];

function h(bytes){ if(bytes==null) return ''; var u=['B','KB','MB','GB']; var i=0,n=bytes; while(n>=1024&&i<u.length-1){n/=1024;i++;} return (i>=2?n.toFixed(1):Math.round(n))+' '+u[i]; }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function mediaClass(m){ return {'影片':'mv','音檔':'au','講義PDF':'pd','文件':'dc','表單':'xl','連結':'lk','圖片':'im'}[m]||'ot'; }
function catClass(c){ return {'梵唄唱誦':'c1','法器':'c2','香燈實務':'c3','法會教材':'c4','梵唄開示':'c5','發聲教學':'c6'}[c]||'c0'; }

var state={ q:'', cat:'', media:'', lesson:null, event:'', piece:'', page:1 };
var PAGE=60;

function counts(field){ var m={}; for(var i=0;i<DATA.length;i++){ var v=DATA[i][field]; if(v==null||v==='') continue; m[v]=(m[v]||0)+1; } return m; }
function lessonCount(n){ var k=0; for(var i=0;i<DATA.length;i++) if(DATA[i].lesson===n) k++; return k; }

function match(x){
  if(state.cat && x.category!==state.cat) return false;
  if(state.media && x.mediaType!==state.media) return false;
  if(state.lesson!=null && x.lesson!==state.lesson) return false;
  if(state.event && x.event!==state.event) return false;
  if(state.piece && x.piece!==state.piece) return false;
  if(state.q){
    var q=state.q.toLowerCase();
    var hay=((x.title||'')+' '+(x.path||'')+' '+(x.piece||'')+' '+(x.event||'')+' '+(x.category||'')).toLowerCase();
    if(hay.indexOf(q)<0) return false;
  }
  return true;
}

function renderChips(){
  // 主分類
  var cc=counts('category');
  var html='<button class="seg-b'+(state.cat===''?' on':'')+'" data-cat="">全部 <i>'+DATA.length+'</i></button>';
  for(var i=0;i<CATS.length;i++){ var c=CATS[i]; if(!cc[c]) continue; html+='<button class="seg-b '+catClass(c)+(state.cat===c?' on':'')+'" data-cat="'+c+'">'+c+' <i>'+cc[c]+'</i></button>'; }
  document.getElementById('cats').innerHTML=html;
  // 媒體
  var mc=counts('mediaType');
  var mh='<span class="flbl">類型：</span><button class="mchip'+(state.media===''?' on':'')+'" data-media="">全部</button>';
  for(var j=0;j<MEDIA.length;j++){ var m=MEDIA[j]; if(!mc[m]) continue; mh+='<button class="mchip '+mediaClass(m)+(state.media===m?' on':'')+'" data-media="'+m+'">'+m+' '+mc[m]+'</button>'; }
  document.getElementById('media').innerHTML=mh;
  // 法會
  var ec=counts('event'); var evs=Object.keys(ec).sort(function(a,b){return ec[b]-ec[a];});
  var eh='<span class="flbl">法會：</span><button class="echip'+(state.event===''?' on':'')+'" data-ev="">全部</button>';
  for(var k=0;k<evs.length;k++){ eh+='<button class="echip'+(state.event===evs[k]?' on':'')+'" data-ev="'+evs[k]+'">'+evs[k]+' '+ec[evs[k]]+'</button>'; }
  document.getElementById('events').innerHTML=eh;
}

function renderMap(){
  var html='';
  for(var g=0;g<LESSONMAP.length;g++){
    var grp=LESSONMAP[g];
    html+='<div class="mapgrp"><div class="mapgrp-t">'+grp.group+'</div><div class="mapgrid">';
    for(var i=0;i<grp.lessons.length;i++){
      var L=grp.lessons[i]; var n=lessonCount(L.n);
      var on=(state.lesson===L.n)?' on':''; var dim=(n===0)?' dim':'';
      html+='<button class="lcard'+on+dim+'" data-lesson="'+L.n+'"><span class="lno">'+L.no+'</span><span class="lnm">'+L.name+'</span><span class="lct">'+(n>0?n+' 份':'課堂教學')+'</span></button>';
    }
    html+='</div></div>';
  }
  document.getElementById('map').innerHTML=html;
}

function activePills(){
  var p=[];
  if(state.cat) p.push(['分類：'+state.cat,'cat']);
  if(state.lesson!=null){ var nm=lessonName(state.lesson); p.push(['課程：'+nm,'lesson']); }
  if(state.event) p.push(['法會：'+state.event,'event']);
  if(state.piece) p.push(['曲目：'+state.piece,'piece']);
  if(state.media) p.push(['類型：'+state.media,'media']);
  if(state.q) p.push(['搜尋：'+state.q,'q']);
  if(!p.length) return '';
  var html='';
  for(var i=0;i<p.length;i++) html+='<button class="pill" data-clear="'+p[i][1]+'">'+esc(p[i][0])+' ✕</button>';
  html+='<button class="pill clr" data-clear="all">全部清除</button>';
  return html;
}
function lessonName(n){ for(var g=0;g<LESSONMAP.length;g++) for(var i=0;i<LESSONMAP[g].lessons.length;i++) if(LESSONMAP[g].lessons[i].n===n) return LESSONMAP[g].lessons[i].no+' '+LESSONMAP[g].lessons[i].name; return '第'+n+'堂'; }

function renderPieces(){
  var pc=counts('piece'); var ps=Object.keys(pc).sort(function(a,b){return pc[b]-pc[a]||a.localeCompare(b,'zh-Hant');});
  var html='';
  for(var i=0;i<ps.length;i++){ html+='<button class="pchip'+(state.piece===ps[i]?' on':'')+'" data-piece="'+ps[i]+'">'+ps[i]+' <i>'+pc[ps[i]]+'</i></button>'; }
  document.getElementById('pieces').innerHTML=html;
}

function render(){
  renderChips(); renderMap(); renderPieces();
  var list=DATA.filter(match);
  document.getElementById('pills').innerHTML=activePills();
  var total=list.length;
  var shown=Math.min(state.page*PAGE, total);
  document.getElementById('status').innerHTML='共 <b>'+total+'</b> 份學習材料'+(total>shown?'（顯示前 '+shown+' 份）':'');
  var html='';
  if(total===0){ html='<div class="empty">找不到符合的材料。<br>試試清除篩選、或換個關鍵字（例如：爐香讚、木魚、地藏、牌位）。</div>'; }
  for(var i=0;i<shown;i++){
    var x=list[i];
    var chips='';
    chips+='<span class="tag '+catClass(x.category)+'">'+x.category+'</span>';
    if(x.lesson!=null) chips+='<span class="tag les">'+lessonName(x.lesson)+'</span>';
    if(x.piece && (x.lesson==null)) chips+='<span class="tag pc">'+esc(x.piece)+'</span>';
    if(x.event) chips+='<span class="tag ev">'+esc(x.event)+'</span>';
    chips+='<span class="tag '+mediaClass(x.mediaType)+'">'+x.mediaType+'</span>';
    if(x.size) chips+='<span class="tag sz">'+h(x.size)+'</span>';
    if(x.restricted) chips+='<span class="tag rst">限常住</span>';
    html+='<div class="card">'
      +'<div class="ct">'+esc(x.title)+'</div>'
      +'<div class="chips">'+chips+'</div>'
      +'<div class="src">📁 '+esc(x.path)+'</div>'
      +'<a class="open" href="'+x.url+'" target="_blank" rel="noopener">在 Google Drive 開啟 →</a>'
      +'</div>';
  }
  document.getElementById('results').innerHTML=html;
  document.getElementById('more').style.display=(total>shown)?'block':'none';
}

document.addEventListener('click',function(e){
  var t=e.target.closest('[data-cat],[data-media],[data-ev],[data-lesson],[data-piece],[data-clear]');
  if(!t) return;
  if(t.hasAttribute('data-cat')){ state.cat=t.getAttribute('data-cat'); state.page=1; }
  else if(t.hasAttribute('data-media')){ state.media=t.getAttribute('data-media'); state.page=1; }
  else if(t.hasAttribute('data-ev')){ var v=t.getAttribute('data-ev'); state.event=(state.event===v?'':v); state.page=1; }
  else if(t.hasAttribute('data-piece')){ var pv=t.getAttribute('data-piece'); state.piece=(state.piece===pv?'':pv); state.page=1; scrollTo(0,document.getElementById('status').offsetTop-70); }
  else if(t.hasAttribute('data-lesson')){ var n=parseInt(t.getAttribute('data-lesson'),10); state.lesson=(state.lesson===n?null:n); state.page=1; scrollTo(0,document.getElementById('status').offsetTop-70); }
  else if(t.hasAttribute('data-clear')){ var w=t.getAttribute('data-clear'); if(w==='all'){state={q:'',cat:'',media:'',lesson:null,event:'',piece:'',page:1}; document.getElementById('q').value='';} else { if(w==='q')document.getElementById('q').value=''; state[w]=(w==='lesson'?null:''); state.page=1; } }
  render();
});
document.getElementById('q').addEventListener('input',function(e){ state.q=e.target.value.trim(); state.page=1; render(); });
document.getElementById('more').addEventListener('click',function(){ state.page++; render(); });
document.getElementById('togglemap').addEventListener('click',function(){ var m=document.getElementById('mapwrap'); var b=this; if(m.style.display==='none'){m.style.display='block';b.textContent='▲ 收合課程地圖';} else {m.style.display='none';b.textContent='▼ 展開課程地圖（新眾梵唄課程 19 堂）';} });
document.getElementById('togglepiece').addEventListener('click',function(){ var m=document.getElementById('piecewrap'); var b=this; if(m.style.display==='none'){m.style.display='block';b.textContent='▲ 收合曲目清單';} else {m.style.display='none';b.textContent='▼ 依曲目瀏覽（爐香讚・大悲懺・早晚課・供養偈…）';} });
render();

</script>
